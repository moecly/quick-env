[tools.nvim]
name = "nvim"
type = "binary"
display_name = "Neovim"
description = "Hyperextensible Vim-based text editor"
installable_by = ["github", "package_manager"]
aliases = ["neovim"]
links = [{glob = "nvim", run = "nvim"}]
custom_version_cmd = "nvim --version"

[tools.nvim.github]
repo = "neovim/neovim"
priority = 10
supported = {android = false}

[tools.nvim.github.asset_patterns]
linux_x86_64 = "nvim-linux-x86_64.tar.gz"
linux_arm64 = "nvim-linux-arm64.tar.gz"
darwin_x86_64 = "nvim-macos-x86_64.tar.gz"
darwin_arm64 = "nvim-macos-arm64.tar.gz"
windows_x86_64 = "nvim-win64.zip"
windows_arm64 = "nvim-win-arm64.zip"
android_arm64 = "nvim-linux-arm64.tar.gz"

[tools.nvim.package_manager]
name = "neovim"
priority = 30

[tools.nvim.package_manager.commands]
apt = "neovim"
brew = "neovim"
dnf = "neovim"
pacman = "neovim"
pkg = "neovim"
default = "neovim"

[tools.tmux]
name = "tmux"
type = "binary"
display_name = "Tmux"
description = "Terminal multiplexer"
installable_by = ["package_manager", "custom_url"]
links = [{glob = "tmux", run = "tmux"}]
custom_version_cmd = "tmux -V"

[tools.tmux.package_manager]
name = "tmux"
priority = 10

[tools.tmux.package_manager.commands]
apt = "tmux"
brew = "tmux"
dnf = "tmux"
pacman = "tmux"
pkg = "tmux"
default = "tmux"

[tools.tmux.custom_url]
extract = true
default = "https://github.com/tmux/tmux/releases/download/{version}/tmux-{version}-linux-x86_64.tar.gz"

[tools.tmux-config]
name = "tmux-config"
type = "dotfile"
display_name = "Tmux Config"
description = "My tmux configuration"
installable_by = ["dotfile"]
config_repo = "moecly/tmux_config"
config_branch = "main"
exclude = ["*.md", "README.md"]
links = [
    {glob = ".tmux.conf", to = "~/.tmux.conf"},
    {glob = ".tmux.conf.local", to = "~/.tmux.conf.local"}
]

[tools.nvim-config]
name = "nvim-config"
type = "dotfile"
display_name = "Neovim Config"
description = "My neovim configuration"
installable_by = ["dotfile"]
config_repo = "moecly/nvim-config"
config_branch = "main"
exclude = ["*.md", "README.md", ".git", "LICENSE", "lazyvim.json", "lazy-lock.json", "stylua.toml"]
links = [
    {glob = "*", to = "~/.config/nvim/"}]